world_model:
  name: vidwm
  checkpoint_path: checkpoints/wm/checkpoint-120000.pt
  params:
    svd_model_path: external/stable-video-diffusion-img2vid
    clip_model_path: external/clip-vit-base-patch32
    debug: true
    debug_log_limit: 3
    num_frames: 5
    num_history: 6
    action_dim: 7
    action_downsample: 3
    width: 320
    height: 192
    num_inference_steps: 4
    decode_to_rgb: true

policy:
  name: openpi
  checkpoint_path: gs://openpi-assets/checkpoints/pi05_droid
  params:
    config_name: pi05_droid
    repo_path: external/openpi
    pytorch_device: cuda
    debug: true
    debug_log_limit: 3
    exterior_view_name: exterior_right
    wrist_view_name: wrist
    stacked_view_order: [exterior_left, exterior_right, wrist]
    resize_height: 224
    resize_width: 224
    joint_position_dim: 7
    action_adapter_checkpoint_path: checkpoints/action_adapter/model2_15_9.pth

reward_model:
  name: dummy
  params: {}

scheduler:
  chunk_size: 15

# Duration of the rollout in seconds.  At 15 Hz action frequency and
# chunk_size 15, each second produces one world-model call (5 frames).
duration: 2
action_hz: 15
video_dir: outputs/irom_test_carrot_openpi_videos
dataset_path: data/evaluation_suites/irom_test_carrot
