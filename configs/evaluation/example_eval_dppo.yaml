world_model:
  name: vidwm
  checkpoint_path: checkpoints/wm/checkpoint-120000.pt
  params:
    svd_model_path: external/stable-video-diffusion-img2vid
    clip_model_path: external/clip-vit-base-patch32
    debug: true
    debug_log_limit: 3
    num_frames: 5
    num_history: 6
    action_dim: 7
    action_downsample: 3
    width: 320
    height: 192
    num_inference_steps: 4
    decode_to_rgb: true

policy:
  name: dp
  checkpoint_path: path/to/dppo/checkpoint.pt
  params:
    repo_path: external/dsrl/dppo
    config_path: configs/training/dppo_pretrain_0108_v0_success.yaml
    normalization_path: data/dppo_processed/0108_v0_success/normalization.npz
    ordered_obs_keys: ["joint_positions", "gripper_position"]
    view_names: ["wrist", "exterior_right"]
    stacked_view_order: [exterior_left, exterior_right, wrist]
    camera_indices: [0, 1]
    device: cuda

reward_model:
  name: robometer
  params:
    model_path: robometer/Robometer-4B
    fps: 2.0
    success_threshold: 0.8

scheduler:
  chunk_size: 15

duration: 10
action_hz: 15
video_dir: outputs/irom_test_carrot_dppo_videos
dataset_path: data/evaluation_suites/irom_test_carrot
